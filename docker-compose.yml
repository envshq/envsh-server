name: envsh-dev

services:
  postgres:
    container_name: envsh-dev-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: envsh
      POSTGRES_PASSWORD: envsh
      POSTGRES_DB: envsh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envsh"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - envsh-dev-net

  redis:
    container_name: envsh-dev-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - envsh-dev-net

volumes:
  postgres_data:
  redis_data:

networks:
  envsh-dev-net:
    name: envsh-dev-net
