services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: envsh
      POSTGRES_PASSWORD: ${DB_PASSWORD:-envsh}
      POSTGRES_DB: envsh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envsh"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://envsh:${DB_PASSWORD:-envsh}@postgres:5432/envsh?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DATABASE_URL: "postgres://envsh:${DB_PASSWORD:-envsh}@postgres:5432/envsh?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      SERVER_ADDR: ":8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-console}"
      EMAIL_FROM: "${EMAIL_FROM:-noreply@envsh.dev}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
